<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — EX3M ARENA</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="wrap header-inner">
    <a href="index.html" class="logo"><span class="mark"></span>EX<span class="three">3</span>M ARENA</a>
    <nav>
      <a href="index.html" data-i18n="nav_tournaments">Турниры</a>
    </nav>
    <div class="lang-switch">
      <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="ka" onclick="setLang('ka')">KA</button>
      <button class="lang-btn" data-lang="hy" onclick="setLang('hy')">HY</button>
    </div>
  </div>
</header>

<div class="wrap" style="max-width:420px;padding-top:56px;padding-bottom:56px">
  <div class="tabs">
    <button class="tab active" id="tab-login" data-i18n="login_in">Вход</button>
    <button class="tab" id="tab-signup" data-i18n="signup_in">Регистрация</button>
  </div>

  <div class="panel" id="login-panel">
    <h3 data-i18n="login_title">Вход в аккаунт</h3>
    <form id="login-form">
      <div class="field">
        <label data-i18n="field_email">Email</label>
        <input type="email" id="login-email" required>
      </div>
      <div class="field">
        <label data-i18n="field_password">Пароль</label>
        <input type="password" id="login-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" data-i18n="btn_login">Войти</button>
    </form>
    <p class="form-note" id="login-msg"></p>
  </div>

  <div class="panel" id="signup-panel" style="display:none">
    <h3 data-i18n="signup_title">Создать аккаунт</h3>
    <form id="signup-form">
      <div class="field">
        <label data-i18n="field_email">Email</label>
        <input type="email" id="signup-email" required>
      </div>
      <div class="field">
        <label data-i18n="field_password_hint">Пароль (минимум 6 символов)</label>
        <input type="password" id="signup-password" minlength="6" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" data-i18n="btn_signup">Зарегистрироваться</button>
    </form>
    <p class="form-note" id="signup-msg"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="i18n.js"></script>
<script>
document.getElementById('tab-login').onclick = () => {
  document.getElementById('tab-login').classList.add('active');
  document.getElementById('tab-signup').classList.remove('active');
  document.getElementById('login-panel').style.display = 'block';
  document.getElementById('signup-panel').style.display = 'none';
};
document.getElementById('tab-signup').onclick = () => {
  document.getElementById('tab-signup').classList.add('active');
  document.getElementById('tab-login').classList.remove('active');
  document.getElementById('signup-panel').style.display = 'block';
  document.getElementById('login-panel').style.display = 'none';
};

const params = new URLSearchParams(location.search);
const redirect = params.get('redirect') || 'index.html';

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  const msg = document.getElementById('login-msg');
  if (error) { msg.textContent = 'Ошибка: ' + error.message; msg.style.color = 'var(--red)'; }
  else { location.href = redirect; }
});

document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('signup-email').value;
  const password = document.getElementById('signup-password').value;
  const { data, error } = await sb.auth.signUp({ email, password });
  const msg = document.getElementById('signup-msg');
  if (error) {
    msg.textContent = 'Ошибка: ' + error.message; msg.style.color = 'var(--red)';
  } else if (data.session) {
    // Подтверждение почты отключено — аккаунт уже активен, входим сразу
    location.href = redirect;
  } else {
    msg.textContent = 'Готово! Проверь почту для подтверждения, затем войди.'; msg.style.color = 'var(--cyan)';
  }
});
</script>

</body>
</html>
